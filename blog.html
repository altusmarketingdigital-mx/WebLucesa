<!doctype html>
<html lang="es">
  <head>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Lucesa Distribución</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <!-- Header -->
    <header class="main-header">
      <div class="container header-inner">
        <a href="/" class="logo">
          <img src="/logo.svg" alt="Lucesa" class="logo-img"><span>Lucesa</span> Distribución
        </a>
        <div class="header-actions">
          <a href="/" class="btn btn-outline" style="padding: 8px 16px; font-size: 14px; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Regresar a la tienda
          </a>
        </div>
      </div>
    </header>

    <main class="container py-5">
      <section class="info-page">
        <h1 class="section-title">Nuestro Blog</h1>
        <div class="info-content card p-4">
          <p>Próximamente encontrarás aquí las últimas noticias sobre tecnología, reseñas de productos y guías de compra.</p>
          <div class="blog-placeholder" style="background:#f4f7f6; padding: 50px; text-align:center; border-radius: 8px;">
            <i class="fas fa-newspaper" style="font-size: 4rem; color: #ccc;"></i>
            <h3 style="margin-top:20px;">Estamos preparando contenido increíble para ti.</h3>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="main-footer mt-5">
      <div class="container">
        <p>&copy; 2026 Lucesa Distribución. <a href="/">Volver al Inicio</a></p>
      </div>
    </footer>
  </body>
</html>
