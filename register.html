<!doctype html>
<html lang="es">
<head>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta - Lucesa Distribución</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css?v=1775676969">
  <style>
    body { background: var(--color-bg-light); }

    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .auth-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.10);
      padding: 48px 44px;
      width: 100%;
      max-width: 500px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo img { height: 48px; }
    .auth-logo h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--color-text-main);
      margin: 12px 0 4px;
      letter-spacing: -0.5px;
    }
    .auth-logo p {
      font-size: 15px;
      color: var(--color-text-muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-main);
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--color-border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--color-text-main);
      transition: border .2s, box-shadow .2s;
      background: #f8fafc;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(26,92,44,0.10);
      outline: none;
      background: #fff;
    }
    .form-group input.error { border-color: #ef4444; }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }
    .btn-register:hover:not(:disabled) {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,92,44,0.25);
    }
    .btn-register:disabled { opacity: .65; cursor: not-allowed; }

    .divider {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--color-border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .auth-footer {
      text-align: center;
      font-size: 14px;
      color: var(--color-text-muted);
      margin-top: 22px;
    }
    .auth-footer a {
      color: var(--color-primary);
      font-weight: 600;
    }

    .alert-error, .alert-success {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .alert-error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    .password-strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 6px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: width .3s, background .3s;
      width: 0;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/"><img src="/logo.svg" alt="Lucesa" onerror="this.style.display='none'"></a>
        <h1>Crear tu cuenta</h1>
        <p>Únete a Lucesa Distribución y compra con facilidad</p>
      </div>

      <div class="alert-error" id="alertError"><i class="fas fa-exclamation-circle"></i> <span id="errorMsg"></span></div>
      <div class="alert-success" id="alertSuccess"><i class="fas fa-check-circle"></i> <span id="successMsg"></span></div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre *</label>
            <div class="input-wrap">
              <i class="fas fa-user"></i>
              <input type="text" id="nombre" placeholder="Juan" autocomplete="given-name" required>
            </div>
          </div>
          <div class="form-group">
            <label for="apellido">Apellido</label>
            <div class="input-wrap">
              <i class="fas fa-user"></i>
              <input type="text" id="apellido" placeholder="Pérez" autocomplete="family-name">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico *</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="juan@ejemplo.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono (opcional)</label>
          <div class="input-wrap">
            <i class="fas fa-phone"></i>
            <input type="tel" id="telefono" placeholder="55 1234 5678" autocomplete="tel">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña *</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña *</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" autocomplete="new-password" required>
          </div>
        </div>

        <button type="submit" class="btn-register" id="registerBtn">
          <i class="fas fa-user-plus"></i> Crear Cuenta
        </button>
      </form>

      <div class="divider">o</div>

      <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <script>
    const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:3001' : '';


    // Password strength meter
    document.getElementById('password').addEventListener('input', function() {
      const v = this.value;
      const bar = document.getElementById('strengthBar');
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const widths = ['0%','30%','55%','75%','100%'];
      const colors = ['#e2e8f0','#ef4444','#f97316','#eab308','#22c55e'];
      bar.style.width  = widths[score];
      bar.style.background = colors[score];
    });

    function showError(msg) {
      const el = document.getElementById('alertError');
      document.getElementById('errorMsg').textContent = msg;
      el.style.display = 'flex';
      document.getElementById('alertSuccess').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('alertSuccess');
      document.getElementById('successMsg').textContent = msg;
      el.style.display = 'flex';
      document.getElementById('alertError').style.display = 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');

      const nombre   = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const email    = document.getElementById('email').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!nombre) return showError('El nombre es requerido.');
      if (!email)  return showError('El correo es requerido.');
      if (password.length < 8) return showError('La contraseña debe tener al menos 8 caracteres.');
      if (password !== confirm) return showError('Las contraseñas no coinciden.');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';

      try {
        const res  = await fetch(`${API}/api/auth/register`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ nombre, apellido, email, telefono, password })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error al crear la cuenta.');

        // Guardar token y perfil en localStorage
        localStorage.setItem('lucesa_token', data.token);
        localStorage.setItem('lucesa_user',  JSON.stringify(data.user));

        showSuccess('¡Cuenta creada! Redirigiendo...');
        setTimeout(() => { window.location.href = '/profile.html'; }, 1200);

      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear Cuenta';
      }
    });
  </script>
</body>
</html>
